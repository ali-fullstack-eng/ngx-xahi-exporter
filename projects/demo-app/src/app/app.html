<div style="padding: 50px; text-align: center; font-family: sans-serif;">
  <h1>Xahi Exporter Library Tester</h1>
  <p>Niche diye gaye buttons par click karke apni library test karen:</p>

  <div style="margin-top: 20px;">
    <button (click)="download('CSV')" style="background: #27ae60; color: white; padding: 10px 20px; border: none; margin: 5px; cursor: pointer;">
      Download CSV
    </button>

    <button (click)="download('EXCEL')" style="background: #2ecc71; color: white; padding: 10px 20px; border: none; margin: 5px; cursor: pointer;">
      Download Excel
    </button>

    <button (click)="download('PDF')" style="background: #e74c3c; color: white; padding: 10px 20px; border: none; margin: 5px; cursor: pointer;">
      Download PDF
    </button>

    <button (click)="downloadPOS()" style="background: #34495e; color: white; padding: 10px 20px; border: none; margin: 5px; cursor: pointer;">
      Print POS Receipt
    </button>
  </div>


</div>
